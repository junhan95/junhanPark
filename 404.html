<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Junhan Park</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#7c3aed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500&family=Fira+Code:wght@400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
        }

        .glow--1 {
            width: 500px;
            height: 500px;
            background: rgba(124, 58, 237, 0.15);
            top: -150px;
            right: -100px;
        }

        .glow--2 {
            width: 400px;
            height: 400px;
            background: rgba(37, 99, 235, 0.12);
            bottom: -100px;
            left: -100px;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 32px;
            max-width: 520px;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        .message {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .sub-message {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 40px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: #fff;
            text-decoration: none;
            border-radius: 28px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 24px rgba(124, 58, 237, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>

<body>
    <div class="glow glow--1"></div>
    <div class="glow glow--2"></div>
    <div class="content">
        <div class="error-code">404</div>
        <p class="message">페이지를 찾을 수 없습니다</p>
        <p class="sub-message">> Page not found</p>
        <a href="/" class="home-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            홈으로 돌아가기
        </a>
    </div>
</body>

</html>
